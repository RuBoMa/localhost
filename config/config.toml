[[servers]]
server_address = "127.0.0.1"
ports = [8080, 8081]
server_name = "localhost"
client_timeout_secs = 120
root = "routes"

  [servers.routes."/"]
  filename = "index.html"
  methods = ["post", "get"]

  [servers.routes."/main"]
  filename = "main.png"

  [servers.routes."/hello"]
  filename = "hello.py"

  [servers.routes."/broken"]
  filename = "no_response.py"

  [servers.routes."/old-page".redirect]
  to = "/"
  code = 302

  # Map extensions to CGI interpreter/command
  # Run using value "python3" if on mac, "python" if on windows
  [servers.cgi_handlers]
  ".py" = "python3"

[[servers]]
server_address = "127.0.0.1"
server_name = "anotherhost"
ports = [8080]
