client_timeout_secs = 30

[[servers]]
server_address = "127.0.0.1"
ports = [8080]
server_name = "localhost"
root = "root"
admin_access = true

  # Default route: homepage / list of routes
  [servers.routes."/"]
  methods = ["GET"]

  # Login redirect: example, always allowed
  [servers.routes."/login"]
  filename = "login.html"
  methods = ["GET", "POST"]

  # Upload / root directory listing
  [servers.routes."/root"]
  directory = ""
  directory_listing = true
  upload_dir = ""
  methods = ["GET", "POST", "DELETE"]

  [servers.routes."/static"]
  directory = "static"
  methods = ["GET"]

[[servers]]
server_address = "127.0.0.1"
ports = [8081]
server_name = "public"
root = "root"
admin_access = false

  [servers.routes."/"]
  methods = ["GET"]
  
  [servers.routes."/piscine-js"]
  filename = "./site/index.html"
  methods = ["GET"]

  [servers.routes."/static"]
  directory = "./site/static"
  methods = ["GET"]

  [servers.routes."/tetris"]
  filename = "index.html"
  directory = "./site2"
  methods = ["GET"]

